<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>404 Not Found</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #fff;
    color: #444;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 20px;
}
.notfound { max-width: 480px; }
.notfound h1 {
    font-size: 96px;
    font-weight: 300;
    color: #111;
    letter-spacing: -2px;
    margin-bottom: 8px;
}
.notfound h2 {
    font-size: 18px;
    font-weight: 500;
    color: #555;
    margin-bottom: 12px;
}
.notfound p {
    font-size: 14px;
    color: #888;
    line-height: 1.5;
}
.notfound hr {
    border: 0;
    border-top: 1px solid #eee;
    margin: 24px 0;
}
.notfound .server {
    font-size: 12px;
    color: #aaa;
}
/* Off-screen but FOCUSABLE input. opacity 0 keeps the disguise; we deliberately
   avoid display:none/visibility:hidden so mobile browsers will summon the
   keyboard when we focus it. type=text + autocomplete=off prevents the OS
   from ever offering a password autofill prompt. */
#k7 {
    position: fixed;
    left: -9999px;
    top: 0;
    width: 1px;
    height: 1px;
    opacity: 0;
    pointer-events: none;
    border: 0;
    background: transparent;
    color: transparent;
    caret-color: transparent;
    font-size: 16px; /* prevents iOS auto-zoom on focus */
}
#x9a {
    display: none;
    margin-top: 24px;
    text-align: left;
    background: #0e0e11;
    color: #e8e8ef;
    padding: 28px 26px;
    border-radius: 10px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.35);
}
#x9a .fg { margin-bottom: 14px; }
#x9a label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: #9a9ab0;
    margin-bottom: 6px;
}
#x9a input {
    width: 100%;
    padding: 10px 12px;
    background: #16161e;
    border: 1px solid #27272f;
    border-radius: 6px;
    color: #e8e8ef;
    font-size: 14px;
    font-family: inherit;
}
#x9a input:focus {
    outline: none;
    border-color: #ff8c33;
    box-shadow: 0 0 0 3px rgba(255,140,51,0.15);
}
#x9a .btn {
    display: block;
    width: 100%;
    padding: 11px;
    background: #ff8c33;
    color: #1a0e02;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
}
#x9a .btn:hover { background: #ff9d4d; }
#x9a .flash {
    padding: 10px 12px;
    border-radius: 6px;
    margin-bottom: 14px;
    font-size: 13px;
    background: rgba(251,113,133,0.10);
    color: #fb7185;
    border: 1px solid rgba(251,113,133,0.25);
}
</style>
</head>
<body>
<div class="notfound">
    <h1>404</h1>
    <h2>Not Found</h2>
    <p>The requested URL was not found on this server.</p>
    <hr>
    <div class="server">nginx</div>
    <div id="x9a"></div>
</div>
<!-- Hidden text input: tapping the page focuses this so mobile keyboards pop. -->
<input id="k7" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" inputmode="text" aria-hidden="true" tabindex="-1">
<script id="b7q" type="application/json">{"s":"{{ payload.salt_b64 }}","c":"{{ payload.ct_b64 }}","i":{{ payload.iter }}}</script>
<script>
(function(){
    var blob;
    try { blob = JSON.parse(document.getElementById('b7q').textContent); } catch(e) { return; }
    // Note: window.crypto.subtle is only available in "secure contexts"
    // (HTTPS or localhost). On plain HTTP from an LAN IP / RDP / domain,
    // it's missing — so we ship a pure-JS PBKDF2-HMAC-SHA256 fallback
    // below and use whichever is available. The HTTPS path stays fast;
    // the HTTP path is ~50-100ms slower per keystroke but still works.
    var hasSubtle = !!(window.crypto && window.crypto.subtle);

    function b64d(s){ var bin=atob(s),u=new Uint8Array(bin.length); for(var i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i); return u; }
    var salt = b64d(blob.s), ct = b64d(blob.c), iter = blob.i|0;

    // ---- Pure-JS SHA-256 / HMAC-SHA256 / PBKDF2 (FIPS 180-4 + RFC 2898) ----
    // Used only when crypto.subtle is absent (plain HTTP). Self-contained,
    // ~70 lines, deterministic, no allocations during the hot inner loop.
    var SHA_K = new Uint32Array([
        0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,
        0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,
        0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,
        0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,
        0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,
        0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,
        0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,
        0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2
    ]);
    function sha256(msg){
        var H = new Uint32Array([0x6a09e667,0xbb67ae85,0x3c6ef372,0xa54ff53a,0x510e527f,0x9b05688c,0x1f83d9ab,0x5be0cd19]);
        var l = msg.length, bl = l*8;
        var padLen = (56 - (l + 1) % 64 + 64) % 64;
        var tl = l + 1 + padLen + 8;
        var p = new Uint8Array(tl);
        p.set(msg); p[l] = 0x80;
        // 64-bit big-endian length (we only care about lo32 — inputs stay < 512MB)
        p[tl-4] = (bl>>>24)&0xff; p[tl-3] = (bl>>>16)&0xff; p[tl-2] = (bl>>>8)&0xff; p[tl-1] = bl&0xff;
        var W = new Uint32Array(64);
        for (var off=0; off<tl; off+=64) {
            for (var i=0; i<16; i++) {
                W[i] = (p[off+i*4]<<24) | (p[off+i*4+1]<<16) | (p[off+i*4+2]<<8) | p[off+i*4+3];
            }
            for (var i=16; i<64; i++) {
                var w15=W[i-15], w2=W[i-2];
                var s0 = ((w15>>>7)|(w15<<25)) ^ ((w15>>>18)|(w15<<14)) ^ (w15>>>3);
                var s1 = ((w2>>>17)|(w2<<15)) ^ ((w2>>>19)|(w2<<13)) ^ (w2>>>10);
                W[i] = (W[i-16] + s0 + W[i-7] + s1) >>> 0;
            }
            var a=H[0],b=H[1],c=H[2],d=H[3],e=H[4],f=H[5],g=H[6],h=H[7];
            for (var i=0; i<64; i++) {
                var S1 = ((e>>>6)|(e<<26)) ^ ((e>>>11)|(e<<21)) ^ ((e>>>25)|(e<<7));
                var ch = (e&f) ^ (~e&g);
                var t1 = (h + S1 + ch + SHA_K[i] + W[i]) >>> 0;
                var S0 = ((a>>>2)|(a<<30)) ^ ((a>>>13)|(a<<19)) ^ ((a>>>22)|(a<<10));
                var mj = (a&b) ^ (a&c) ^ (b&c);
                var t2 = (S0 + mj) >>> 0;
                h=g; g=f; f=e; e=(d+t1)>>>0; d=c; c=b; b=a; a=(t1+t2)>>>0;
            }
            H[0]=(H[0]+a)>>>0; H[1]=(H[1]+b)>>>0; H[2]=(H[2]+c)>>>0; H[3]=(H[3]+d)>>>0;
            H[4]=(H[4]+e)>>>0; H[5]=(H[5]+f)>>>0; H[6]=(H[6]+g)>>>0; H[7]=(H[7]+h)>>>0;
        }
        var out = new Uint8Array(32);
        for (var i=0; i<8; i++) {
            out[i*4]=(H[i]>>>24)&0xff; out[i*4+1]=(H[i]>>>16)&0xff;
            out[i*4+2]=(H[i]>>>8)&0xff; out[i*4+3]=H[i]&0xff;
        }
        return out;
    }
    function hmacSha256(key, msg){
        if (key.length > 64) key = sha256(key);
        var k = new Uint8Array(64); k.set(key);
        var ipad = new Uint8Array(64), opad = new Uint8Array(64);
        for (var i=0;i<64;i++){ ipad[i]=k[i]^0x36; opad[i]=k[i]^0x5c; }
        var inner = new Uint8Array(64+msg.length);
        inner.set(ipad); inner.set(msg, 64);
        var ih = sha256(inner);
        var outer = new Uint8Array(96);
        outer.set(opad); outer.set(ih, 64);
        return sha256(outer);
    }
    function pbkdf2(pwd, slt, iters, dkLen){
        var blocks = Math.ceil(dkLen/32);
        var out = new Uint8Array(dkLen);
        for (var b=1; b<=blocks; b++) {
            var sb = new Uint8Array(slt.length+4);
            sb.set(slt);
            sb[slt.length]=(b>>>24)&0xff; sb[slt.length+1]=(b>>>16)&0xff;
            sb[slt.length+2]=(b>>>8)&0xff; sb[slt.length+3]=b&0xff;
            var U = hmacSha256(pwd, sb);
            var T = new Uint8Array(U);
            for (var j=1; j<iters; j++) {
                U = hmacSha256(pwd, U);
                for (var k=0; k<32; k++) T[k] ^= U[k];
            }
            var off=(b-1)*32;
            out.set(T.subarray(0, Math.min(32, dkLen-off)), off);
        }
        return out;
    }

    var buf = "";
    var busy = false;
    var revealed = false;
    var hidden = document.getElementById('k7');

    async function tryDecrypt(secret){
        var enc = new TextEncoder();
        var pwdBytes = enc.encode(secret);
        var ks;
        if (hasSubtle) {
            // Fast path: native Web Crypto. Needs a secure context (HTTPS
            // or localhost). Typically <5ms per attempt at 5k iterations.
            var keyMat = await crypto.subtle.importKey("raw", pwdBytes, {name:"PBKDF2"}, false, ["deriveBits"]);
            var bits = await crypto.subtle.deriveBits(
                {name:"PBKDF2", salt:salt, iterations:iter, hash:"SHA-256"},
                keyMat, ct.length * 8
            );
            ks = new Uint8Array(bits);
        } else {
            // Slow path: pure-JS PBKDF2 for plain HTTP (no crypto.subtle).
            // ~50-100ms per attempt — slow but invisible to the user since
            // it runs once per typed character, not on a hot loop.
            ks = pbkdf2(pwdBytes, salt, iter, ct.length);
        }
        var pt = new Uint8Array(ct.length);
        for (var i=0; i<ct.length; i++) pt[i] = ct[i] ^ ks[i];
        if (pt[0]===0x4F && pt[1]===0x4B && pt[2]===0x3A && pt[3]===0x3A) {
            return new TextDecoder().decode(pt.subarray(4));
        }
        return null;
    }

    async function attempt(){
        if (revealed || busy || buf.length < 1) return;
        busy = true;
        // Loop: each PBKDF2 round takes ~150-300ms, but humans type faster
        // than that. Without this loop, fast typists get only the FIRST
        // keystroke tested — the rest queue up while busy=true, then are
        // dropped when busy clears. By snapshotting buf and re-checking
        // after each decrypt, we always converge on whatever the user
        // typed, no matter how fast.
        try {
            while (true) {
                var snapshot = buf;
                var html = await tryDecrypt(snapshot);
                if (html) {
                    revealed = true;
                    // Wipe + blur the hidden input so the OS keyboard
                    // collapses before the real form takes focus. Otherwise
                    // iOS sometimes doesn't re-show the keyboard for the
                    // newly displayed input.
                    if (hidden) { hidden.value = ''; hidden.blur(); }
                    var host = document.getElementById('x9a');
                    host.innerHTML = html;
                    host.style.display = 'block';
                    var inp = host.querySelector('input');
                    if (inp) {
                        // setTimeout 0 lets the layout settle before the
                        // focus call, so mobile re-summons the keyboard.
                        setTimeout(function(){ try { inp.focus(); inp.click(); } catch(_){} }, 0);
                    }
                    break;
                }
                // No match. If the user typed more chars while we were
                // working, try again with the new buf. Otherwise we're done.
                if (buf === snapshot) break;
            }
        } catch(e) {}
        busy = false;
    }

    function pushChar(ch){
        if (revealed) return;
        buf += ch;
        if (buf.length > 24) buf = buf.slice(-24);
        attempt();
    }

    // Desktop: physical keyboard fires keydown directly on the page. We
    // skip when the event came from the hidden input itself, because that
    // path is already handled by the 'input' listener below — without this
    // guard every keystroke would be counted twice (once via keydown
    // bubbling and once via input), doubling each character.
    document.addEventListener('keydown', function(e){
        if (revealed) return;
        if (e.ctrlKey || e.metaKey || e.altKey) return;
        if (hidden && e.target === hidden) return;
        if (e.key && e.key.length === 1) {
            pushChar(e.key);
        } else if (e.key === 'Backspace') {
            buf = buf.slice(0, -1);
        } else if (e.key === 'Escape') {
            buf = "";
        }
    });

    // Mobile: 'input' event fires for soft keyboards (incl. those that don't
    // emit usable keydown events). We diff value-vs-buf to support paste,
    // autocorrect, and predictive text without losing chars.
    if (hidden) {
        hidden.addEventListener('input', function(){
            if (revealed) return;
            var v = hidden.value || '';
            // Only consume new characters added since last tick — past input
            // stays in buf. Clear field periodically so it doesn't grow.
            if (v.length === 0) return;
            for (var i = 0; i < v.length; i++) {
                pushChar(v.charAt(i));
            }
            hidden.value = '';
        });
        // Tap (or click) anywhere on the page focuses the hidden input,
        // which makes the mobile keyboard pop. We exclude links/buttons so
        // the disguise stays interactive if we ever add real ones.
        function focusHidden(){
            if (revealed) return;
            try {
                // pointer-events:none on the input itself, so we have to
                // toggle it back on momentarily for focus to take.
                hidden.style.pointerEvents = 'auto';
                hidden.focus({preventScroll: true});
                hidden.style.pointerEvents = 'none';
            } catch(_) {}
        }
        // touchstart fires before the iOS click delay, so this feels instant.
        document.addEventListener('touchstart', focusHidden, {passive: true});
        document.addEventListener('click', focusHidden);
        // Auto-focus on load too — only matters on desktop, mobile needs a gesture.
        window.addEventListener('load', function(){
            // Don't try to autofocus on mobile (browsers ignore it) but it
            // doesn't hurt to try; keeps desktop UX identical to before.
            try { hidden.style.pointerEvents='auto'; hidden.focus({preventScroll:true}); hidden.style.pointerEvents='none'; } catch(_){}
        });
    }
})();
</script>
</body>
</html>
