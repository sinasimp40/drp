<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>404 Not Found</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #fff;
    color: #444;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 20px;
}
.notfound { max-width: 480px; }
.notfound h1 {
    font-size: 96px;
    font-weight: 300;
    color: #111;
    letter-spacing: -2px;
    margin-bottom: 8px;
}
.notfound h2 {
    font-size: 18px;
    font-weight: 500;
    color: #555;
    margin-bottom: 12px;
}
.notfound p {
    font-size: 14px;
    color: #888;
    line-height: 1.5;
}
.notfound hr {
    border: 0;
    border-top: 1px solid #eee;
    margin: 24px 0;
}
.notfound .server {
    font-size: 12px;
    color: #aaa;
}
#x9a {
    display: none;
    margin-top: 24px;
    text-align: left;
    background: #0e0e11;
    color: #e8e8ef;
    padding: 28px 26px;
    border-radius: 10px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.35);
}
#x9a .fg { margin-bottom: 14px; }
#x9a label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: #9a9ab0;
    margin-bottom: 6px;
}
#x9a input {
    width: 100%;
    padding: 10px 12px;
    background: #16161e;
    border: 1px solid #27272f;
    border-radius: 6px;
    color: #e8e8ef;
    font-size: 14px;
    font-family: inherit;
}
#x9a input:focus {
    outline: none;
    border-color: #ff8c33;
    box-shadow: 0 0 0 3px rgba(255,140,51,0.15);
}
#x9a .btn {
    display: block;
    width: 100%;
    padding: 11px;
    background: #ff8c33;
    color: #1a0e02;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
}
#x9a .btn:hover { background: #ff9d4d; }
#x9a .flash {
    padding: 10px 12px;
    border-radius: 6px;
    margin-bottom: 14px;
    font-size: 13px;
    background: rgba(251,113,133,0.10);
    color: #fb7185;
    border: 1px solid rgba(251,113,133,0.25);
}
</style>
</head>
<body>
<div class="notfound">
    <h1>404</h1>
    <h2>Not Found</h2>
    <p>The requested URL was not found on this server.</p>
    <hr>
    <div class="server">nginx</div>
    <div id="x9a"></div>
</div>
<script id="b7q" type="application/json">{"s":"{{ payload.salt_b64 }}","c":"{{ payload.ct_b64 }}","i":{{ payload.iter }}}</script>
<script>
(function(){
    var blob;
    try { blob = JSON.parse(document.getElementById('b7q').textContent); } catch(e) { return; }
    if (!window.crypto || !window.crypto.subtle) return;

    function b64d(s){ var bin=atob(s),u=new Uint8Array(bin.length); for(var i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i); return u; }
    var salt = b64d(blob.s), ct = b64d(blob.c), iter = blob.i|0;

    var buf = "";
    var busy = false;
    var revealed = false;

    async function tryDecrypt(secret){
        var enc = new TextEncoder();
        var keyMat = await crypto.subtle.importKey("raw", enc.encode(secret), {name:"PBKDF2"}, false, ["deriveBits"]);
        var bits = await crypto.subtle.deriveBits(
            {name:"PBKDF2", salt:salt, iterations:iter, hash:"SHA-256"},
            keyMat,
            ct.length * 8
        );
        var ks = new Uint8Array(bits);
        var pt = new Uint8Array(ct.length);
        for (var i=0; i<ct.length; i++) pt[i] = ct[i] ^ ks[i];
        if (pt[0]===0x4F && pt[1]===0x4B && pt[2]===0x3A && pt[3]===0x3A) {
            return new TextDecoder().decode(pt.subarray(4));
        }
        return null;
    }

    async function attempt(){
        if (revealed || busy || buf.length < 1) return;
        busy = true;
        try {
            var html = await tryDecrypt(buf);
            if (html) {
                revealed = true;
                var host = document.getElementById('x9a');
                host.innerHTML = html;
                host.style.display = 'block';
                var inp = host.querySelector('input');
                if (inp) inp.focus();
            }
        } catch(e) {}
        busy = false;
    }

    document.addEventListener('keydown', function(e){
        if (revealed) return;
        if (e.ctrlKey || e.metaKey || e.altKey) return;
        if (e.key && e.key.length === 1) {
            buf += e.key;
            if (buf.length > 24) buf = buf.slice(-24);
            attempt();
        } else if (e.key === 'Backspace') {
            buf = buf.slice(0, -1);
        } else if (e.key === 'Escape') {
            buf = "";
        }
    });
})();
</script>
</body>
</html>
