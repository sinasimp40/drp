<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>License Admin - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0a0a0a;
            color: #e8e8ef;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background-image:
                radial-gradient(circle at 20% 20%, rgba(255,140,51,0.06), transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(230,106,16,0.04), transparent 40%);
        }
        .login-card {
            background: #0e0e11;
            border: 1px solid #1f1f27;
            border-radius: 12px;
            padding: 36px 32px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        .login-brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 6px;
        }
        .login-brand .logo {
            width: 32px; height: 32px;
            border-radius: 7px;
            background: linear-gradient(135deg, #ff8c33, #e66a10);
            display: flex; align-items: center; justify-content: center;
            color: #fff;
            box-shadow: 0 4px 14px rgba(255,140,51,0.3);
        }
        .login-brand h1 {
            font-size: 16px;
            font-weight: 600;
            color: #f3f3f8;
            letter-spacing: -0.01em;
        }
        .subtitle {
            text-align: center;
            color: #6a6a80;
            font-size: 13px;
            margin-bottom: 28px;
        }
        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #9a9ab0;
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 10px 12px;
            background: #16161e;
            border: 1px solid #27272f;
            border-radius: 6px;
            color: #e8e8ef;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.15s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #ff8c33;
            box-shadow: 0 0 0 3px rgba(255,140,51,0.12);
        }
        .btn {
            display: block;
            width: 100%;
            padding: 11px;
            background: #ff8c33;
            color: #1a0e02;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.15s;
            margin-top: 8px;
        }
        .btn:hover { background: #ff9d4d; }
        .flash {
            padding: 10px 12px;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 13px;
            background: rgba(251,113,133,0.08);
            color: #fb7185;
            border: 1px solid rgba(251,113,133,0.25);
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-brand">
            <div class="logo">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M12 8v4M12 16h.01"/></svg>
            </div>
            <h1>DPRS Admin</h1>
        </div>
        <p class="subtitle">Enter password to continue</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="flash">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" autofocus required>
            </div>
            <button type="submit" class="btn">Login</button>
        </form>
    </div>
</body>
</html>
