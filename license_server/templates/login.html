<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>License Admin - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #121218;
            color: #e8e8ef;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: #1c1c26;
            border: 1px solid #2a2a38;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .login-card h1 {
            text-align: center;
            font-size: 20px;
            color: #ff7a1a;
            letter-spacing: 3px;
            margin-bottom: 8px;
        }
        .login-card .subtitle {
            text-align: center;
            color: #7a7a90;
            font-size: 13px;
            margin-bottom: 32px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #9a9ab0;
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 10px 12px;
            background: #16161e;
            border: 1px solid #333345;
            border-radius: 6px;
            color: #e8e8ef;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #ff7a1a;
            box-shadow: 0 0 0 2px rgba(255,122,26,0.15);
        }
        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            background: #ff7a1a;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover { background: #ff9d4d; }
        .flash {
            padding: 10px 12px;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 13px;
            background: #351515;
            color: #ee5555;
            border: 1px solid #502030;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>LICENSE ADMIN</h1>
        <p class="subtitle">Enter password to continue</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="flash">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" autofocus required>
            </div>
            <button type="submit" class="btn">Login</button>
        </form>
    </div>
</body>
</html>
