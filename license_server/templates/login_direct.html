<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sign in</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #0b0b10;
    color: #e8e8ef;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}
.card {
    width: 100%;
    max-width: 360px;
    background: #16161e;
    border: 1px solid #26262e;
    border-radius: 12px;
    padding: 28px 24px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.45);
}
h1 {
    font-size: 18px;
    font-weight: 600;
    color: #e8e8ef;
    margin-bottom: 18px;
    text-align: center;
}
.flash {
    padding: 10px 12px;
    border-radius: 6px;
    margin-bottom: 14px;
    font-size: 13px;
    background: rgba(251,113,133,0.10);
    color: #fb7185;
    border: 1px solid rgba(251,113,133,0.25);
}
label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: #9a9ab0;
    margin-bottom: 6px;
}
input[type="password"] {
    width: 100%;
    padding: 11px 12px;
    background: #0e0e15;
    border: 1px solid #2a2a36;
    border-radius: 6px;
    color: #e8e8ef;
    font-size: 16px; /* >=16px stops iOS auto-zoom */
    font-family: inherit;
    margin-bottom: 14px;
}
input[type="password"]:focus {
    outline: none;
    border-color: #ff8c33;
    box-shadow: 0 0 0 3px rgba(255,140,51,0.15);
}
button {
    display: block;
    width: 100%;
    padding: 12px;
    background: #ff8c33;
    color: #1a0e02;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
}
button:hover { background: #ff9d4d; }
</style>
</head>
<body>
<div class="card">
    <h1>Sign in</h1>
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, msg in messages %}
            <div class="flash">{{ msg }}</div>
        {% endfor %}
    {% endwith %}
    {% if extra_error %}<div class="flash">{{ extra_error }}</div>{% endif %}
    <form method="POST" autocomplete="off">
        <label>Password</label>
        <input type="password" name="password" autofocus required>
        <button type="submit">Sign in</button>
    </form>
</div>
</body>
</html>
