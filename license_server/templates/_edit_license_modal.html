<div id="edit-license-overlay" class="modal-overlay" hidden>
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="edit-license-title">
        <div class="modal-header">
            <h3 id="edit-license-title">Edit license</h3>
            <button type="button" class="icon-btn" onclick="window.closeEditLicenseModal && window.closeEditLicenseModal()" aria-label="Close">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <div class="modal-body">
            <div class="modal-meta">
                <div><span class="meta-label">Key</span><span id="edit-meta-key" class="key-text"></span></div>
                <div><span class="meta-label">Status</span><span id="edit-meta-status"></span></div>
                <div><span class="meta-label">Currently</span><span id="edit-meta-remaining"></span></div>
                <div id="edit-meta-expiry-row" hidden><span class="meta-label">Expires</span><span id="edit-meta-expiry"></span></div>
            </div>

            <form id="edit-license-form" onsubmit="return window.submitEditLicense && window.submitEditLicense(event);">
                <input type="hidden" name="mode" id="edit-mode" value="extend">

                <div class="form-group">
                    <label>Time change</label>
                    <div class="seg">
                        <button type="button" class="seg-btn active" data-mode="extend">Extend by</button>
                        <button type="button" class="seg-btn" data-mode="set">Set remaining to</button>
                        <button type="button" class="seg-btn" data-mode="note_only">Note only</button>
                    </div>
                </div>

                <div class="form-row" id="edit-time-row">
                    <div class="form-group" style="flex: 2;">
                        <label for="edit-amount">Amount <span class="hint" id="edit-amount-hint">(use a negative number to shorten)</span></label>
                        <input type="number" id="edit-amount" name="amount" step="any" placeholder="e.g. 7">
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label for="edit-unit">Unit</label>
                        <select id="edit-unit" name="unit">
                            <option value="days" selected>Days</option>
                            <option value="hours">Hours</option>
                            <option value="minutes">Minutes</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="edit-note">Note</label>
                    <input type="text" id="edit-note" name="note" maxlength="500" placeholder="Customer name, order ref, etc.">
                </div>

                <div id="edit-error" class="modal-error" hidden></div>
                <div id="edit-preview" class="modal-preview" hidden></div>

                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="window.closeEditLicenseModal && window.closeEditLicenseModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="edit-submit">Save</button>
                </div>
            </form>
        </div>
    </div>
</div>

<div id="toast-stack" class="toast-stack" aria-live="polite"></div>

<script>
(function() {
    if (window.__editLicenseModalInit) return;
    window.__editLicenseModalInit = true;

    function formatDuration(seconds) {
        seconds = Math.max(0, Math.floor(seconds));
        if (seconds <= 0) return "Expired";
        var d = Math.floor(seconds / 86400);
        var h = Math.floor((seconds % 86400) / 3600);
        var m = Math.floor((seconds % 3600) / 60);
        if (d > 0) return d + "d " + h + "h " + m + "m";
        if (h > 0) return h + "h " + m + "m";
        return m + "m";
    }

    function ensureToastStack() {
        var s = document.getElementById("toast-stack");
        if (!s) {
            s = document.createElement("div");
            s.id = "toast-stack";
            s.className = "toast-stack";
            s.setAttribute("aria-live", "polite");
            document.body.appendChild(s);
        }
        return s;
    }

    function toast(msg, type) {
        var stack = ensureToastStack();
        var t = document.createElement("div");
        t.className = "toast toast-" + (type || "success");
        t.textContent = msg;
        stack.appendChild(t);
        setTimeout(function() {
            t.style.opacity = "0";
            setTimeout(function() { t.remove(); }, 320);
        }, 4200);
    }

    function editUrlFor(id) { return "/license/" + id + "/edit"; }

    var modal = document.getElementById("edit-license-overlay");
    var elKey = document.getElementById("edit-meta-key");
    var elStatus = document.getElementById("edit-meta-status");
    var elRemaining = document.getElementById("edit-meta-remaining");
    var elMode = document.getElementById("edit-mode");
    var elAmount = document.getElementById("edit-amount");
    var elUnit = document.getElementById("edit-unit");
    var elNote = document.getElementById("edit-note");
    var elError = document.getElementById("edit-error");
    var elPreview = document.getElementById("edit-preview");
    var elTimeRow = document.getElementById("edit-time-row");
    var elAmountHint = document.getElementById("edit-amount-hint");
    var elSubmit = document.getElementById("edit-submit");
    var elExpiryRow = document.getElementById("edit-meta-expiry-row");
    var elExpiry = document.getElementById("edit-meta-expiry");
    var editingId = null;
    var editingRowStatus = null;
    var editingRowExpires = null;
    var editingRowDuration = 0;
    var editingTrigger = null;

    function formatAbsExpiry(ts) {
        if (!ts) return "—";
        var d = new Date(ts * 1000);
        if (isNaN(d.getTime())) return "—";
        var pad = function(n) { return n < 10 ? "0" + n : "" + n; };
        return d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate()) +
               " " + pad(d.getHours()) + ":" + pad(d.getMinutes());
    }

    function setMode(mode) {
        elMode.value = mode;
        var btns = modal.querySelectorAll(".seg-btn");
        btns.forEach(function(b) {
            b.classList.toggle("active", b.getAttribute("data-mode") === mode);
        });
        if (mode === "note_only") {
            elTimeRow.style.display = "none";
        } else {
            elTimeRow.style.display = "";
            elAmountHint.textContent = (mode === "extend")
                ? "(use a negative number to shorten)"
                : "(positive number; replaces remaining time)";
        }
        updatePreview();
    }

    function updatePreview() {
        elPreview.hidden = true;
        elError.hidden = true;
        var mode = elMode.value;
        if (mode === "note_only") {
            elPreview.hidden = false;
            elPreview.textContent = "Will update note only — time unchanged.";
            return;
        }
        var amt = parseFloat(elAmount.value);
        if (isNaN(amt)) return;
        var unitMul = ({minutes: 60, hours: 3600, days: 86400})[elUnit.value] || 86400;
        var deltaSec = Math.round(amt * unitMul);
        var newRemaining;
        var nowSec = Date.now() / 1000;
        if (editingRowStatus === "pending") {
            newRemaining = (mode === "set") ? deltaSec : (editingRowDuration + deltaSec);
        } else if (editingRowStatus === "active" || editingRowStatus === "suspended") {
            var currentExp = editingRowExpires || nowSec;
            newRemaining = (mode === "set")
                ? deltaSec
                : (currentExp + deltaSec - nowSec);
        } else if (editingRowStatus === "expired") {
            if (mode === "set") {
                newRemaining = deltaSec;
            } else {
                var base = editingRowExpires || nowSec;
                newRemaining = base + deltaSec - nowSec;
            }
        } else {
            newRemaining = deltaSec;
        }
        elPreview.hidden = false;
        if (newRemaining <= 0) {
            elPreview.style.color = "var(--bad)";
            elPreview.style.borderColor = "rgba(251,113,133,0.3)";
            elPreview.style.background = "rgba(251,113,133,0.08)";
            elPreview.textContent = "Result: license will be expired.";
        } else {
            elPreview.style.color = "var(--good)";
            elPreview.style.borderColor = "rgba(52,211,153,0.3)";
            elPreview.style.background = "rgba(52,211,153,0.06)";
            var noteText;
            if (editingRowStatus === "pending") noteText = "duration once activated";
            else if (editingRowStatus === "suspended") noteText = "remaining (frozen until unsuspended)";
            else if (editingRowStatus === "expired") noteText = "remaining (license reactivated)";
            else noteText = "remaining time";
            elPreview.textContent = "Result: " + formatDuration(newRemaining) + " " + noteText + ".";
        }
    }

    window.openEditLicenseModal = function(tr) {
        if (!tr || !modal) return;
        editingTrigger = document.activeElement;
        editingId = tr.getAttribute("data-id");
        editingRowStatus = tr.getAttribute("data-status");
        var expRaw = tr.getAttribute("data-expires");
        editingRowExpires = expRaw ? parseFloat(expRaw) : null;
        editingRowDuration = parseInt(tr.getAttribute("data-duration") || "0", 10);
        elKey.textContent = tr.getAttribute("data-key") || "";
        elNote.value = tr.getAttribute("data-note") || "";
        elAmount.value = "";
        elUnit.value = "days";
        elError.hidden = true;
        elPreview.hidden = true;

        var statusLabel = editingRowStatus.charAt(0).toUpperCase() + editingRowStatus.slice(1);
        elStatus.textContent = statusLabel;

        var nowSec = Date.now() / 1000;
        var remainingText;
        if (editingRowStatus === "active" && editingRowExpires) {
            remainingText = formatDuration(Math.max(0, editingRowExpires - nowSec)) + " remaining";
        } else if (editingRowStatus === "pending") {
            remainingText = formatDuration(editingRowDuration) + " (will start when activated)";
        } else if (editingRowStatus === "suspended") {
            var sus = editingRowExpires ? Math.max(0, editingRowExpires - nowSec) : editingRowDuration;
            remainingText = formatDuration(sus) + " (suspended)";
        } else if (editingRowStatus === "expired") {
            remainingText = "Expired — extend or set a new remaining to revive";
        } else {
            remainingText = "—";
        }
        elRemaining.textContent = remainingText;

        if (editingRowExpires) {
            elExpiry.textContent = formatAbsExpiry(editingRowExpires);
            elExpiryRow.hidden = false;
        } else {
            elExpiryRow.hidden = true;
        }

        setMode((editingRowStatus === "expired" && !editingRowExpires) ? "set" : "extend");
        modal.hidden = false;
        setTimeout(function() { elAmount.focus(); }, 50);
    };

    window.closeEditLicenseModal = function() {
        if (modal) modal.hidden = true;
        editingId = null;
        if (editingTrigger && typeof editingTrigger.focus === "function") {
            try { editingTrigger.focus(); } catch (e) {}
        }
        editingTrigger = null;
    };

    window.submitEditLicense = function(ev) {
        ev.preventDefault();
        if (!editingId) return false;
        var mode = elMode.value;
        var amount = elAmount.value.trim();
        if (mode !== "note_only" && amount === "") {
            elError.hidden = false;
            elError.textContent = "Please enter an amount.";
            return false;
        }
        var fd = new FormData();
        fd.append("mode", mode);
        fd.append("unit", elUnit.value);
        fd.append("amount", amount);
        fd.append("note", elNote.value);

        elSubmit.disabled = true;
        elSubmit.textContent = "Saving...";
        fetch(editUrlFor(editingId), {
            method: "POST",
            body: fd,
            credentials: "same-origin",
            headers: { "X-Requested-With": "XMLHttpRequest" }
        })
        .then(function(r) { return r.json().then(function(j) { return { ok: r.ok, body: j }; }); })
        .then(function(res) {
            elSubmit.disabled = false;
            elSubmit.textContent = "Save";
            if (!res.ok || !res.body.success) {
                elError.hidden = false;
                elError.textContent = res.body.error || "Failed to save changes.";
                return;
            }
            toast(res.body.message || "License updated", "success");
            window.closeEditLicenseModal();
            if (typeof window.editLicenseOnSuccess === "function") {
                window.editLicenseOnSuccess(res.body.license);
            } else {
                setTimeout(function() { window.location.reload(); }, 600);
            }
        })
        .catch(function(err) {
            elSubmit.disabled = false;
            elSubmit.textContent = "Save";
            elError.hidden = false;
            elError.textContent = "Network error — please try again.";
        });
        return false;
    };

    if (modal) {
        modal.querySelectorAll(".seg-btn").forEach(function(b) {
            b.addEventListener("click", function() { setMode(b.getAttribute("data-mode")); });
        });
        [elAmount, elUnit].forEach(function(el) {
            if (el) el.addEventListener("input", updatePreview);
        });
        modal.addEventListener("click", function(e) {
            if (e.target === modal) window.closeEditLicenseModal();
        });
        document.addEventListener("keydown", function(e) {
            if (!modal.hidden && e.key === "Escape") window.closeEditLicenseModal();
        });
    }

    window.toast = window.toast || toast;
    window.formatDuration = window.formatDuration || formatDuration;
})();
</script>
