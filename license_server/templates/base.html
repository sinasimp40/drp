<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}License Admin{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0a0a0a;
            color: #f0f0f0;
            min-height: 100vh;
        }
        a { color: #ff6a00; text-decoration: none; }
        a:hover { color: #ff8c33; }

        .navbar {
            background: #111;
            border-bottom: 1px solid #1e1e1e;
            padding: 0 24px;
            display: flex;
            align-items: center;
            height: 56px;
            gap: 32px;
        }
        .navbar .brand {
            font-size: 18px;
            font-weight: 700;
            color: #ff6a00;
            letter-spacing: 2px;
        }
        .navbar .nav-links { display: flex; gap: 24px; }
        .navbar .nav-links a {
            color: #888;
            font-size: 14px;
            font-weight: 500;
            padding: 16px 0;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }
        .navbar .nav-links a:hover,
        .navbar .nav-links a.active {
            color: #ff6a00;
            border-bottom-color: #ff6a00;
        }
        .navbar .spacer { flex: 1; }
        .navbar .logout-btn {
            color: #555;
            font-size: 13px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px 24px;
        }

        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }
        .page-header h1 {
            font-size: 24px;
            font-weight: 600;
            color: #f0f0f0;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: #ff6a00;
            color: #fff;
        }
        .btn-primary:hover { background: #ff8c33; }
        .btn-danger {
            background: #331111;
            color: #ff4444;
            border: 1px solid #442222;
        }
        .btn-danger:hover { background: #442222; }
        .btn-sm { padding: 5px 10px; font-size: 12px; }

        .card {
            background: #111;
            border: 1px solid #1e1e1e;
            border-radius: 8px;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            text-align: left;
            padding: 12px 16px;
            font-size: 12px;
            font-weight: 600;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: #0d0d0d;
            border-bottom: 1px solid #1e1e1e;
        }
        td {
            padding: 12px 16px;
            font-size: 13px;
            border-bottom: 1px solid #1a1a1a;
            color: #ccc;
        }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #151515; }

        .key-text {
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 13px;
            color: #ff8c33;
            letter-spacing: 0.5px;
        }

        .badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .badge-online { background: #0a2a0a; color: #44cc44; }
        .badge-offline { background: #1a1a1a; color: #555; }
        .badge-active { background: #1a2800; color: #88cc00; }
        .badge-expired { background: #2a1a00; color: #cc8800; }
        .badge-revoked { background: #2a0a0a; color: #cc4444; }
        .badge-deleted { background: #1a1a1a; color: #555; }

        .flash {
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 13px;
        }
        .flash-success { background: #0a2a0a; color: #44cc44; border: 1px solid #1a3a1a; }
        .flash-error { background: #2a0a0a; color: #cc4444; border: 1px solid #3a1a1a; }

        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #888;
            margin-bottom: 6px;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            background: #0d0d0d;
            border: 1px solid #2a2a2a;
            border-radius: 6px;
            color: #f0f0f0;
            font-size: 14px;
            font-family: inherit;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #ff6a00;
        }
        .form-row {
            display: flex;
            gap: 12px;
        }
        .form-row .form-group { flex: 1; }

        .empty-state {
            text-align: center;
            padding: 48px 24px;
            color: #555;
        }
        .empty-state p { font-size: 15px; margin-bottom: 16px; }

        .actions-cell { display: flex; gap: 6px; }
        .time-remaining { font-variant-numeric: tabular-nums; }

        @media (max-width: 768px) {
            .navbar { padding: 0 12px; gap: 16px; }
            .container { padding: 16px 12px; }
            .form-row { flex-direction: column; }
            table { font-size: 12px; }
            th, td { padding: 8px 10px; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="brand">LICENSE ADMIN</div>
        <div class="nav-links">
            <a href="{{ url_for('dashboard') }}" class="{% if request.endpoint == 'dashboard' %}active{% endif %}">Dashboard</a>
            <a href="{{ url_for('create_license') }}" class="{% if request.endpoint == 'create_license' %}active{% endif %}">Create Key</a>
            <a href="{{ url_for('history') }}" class="{% if request.endpoint == 'history' %}active{% endif %}">History</a>
        </div>
        <div class="spacer"></div>
        <a href="{{ url_for('logout') }}" class="logout-btn">Logout</a>
    </nav>

    <div class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="flash flash-{{ category }}">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>

    {% block scripts %}{% endblock %}
</body>
</html>
